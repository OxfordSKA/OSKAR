variables:
  GIT_SUBMODULE_STRATEGY: recursive
  DEBIAN_FRONTEND: "noninteractive"
  CUDA_ARCH: "8.0"
  CUDA_VISIBLE_DEVICES: 0
  CONTAINER_SCANNING_DISABLED: 'true'
  DEPENDENCY_SCANNING_DISABLED: 'true'

default:
  image: fdulwich/oskar-ci:cuda-12.6-3
  tags: [ska-dp-default]

stages:
  - build and test
  - scan
  - doc
  - publish

.reports: &ready_reports
  - mkdir -p build/reports/

build-test-debug:
  stage: build and test
  tags: [ska-dp-gpu-a100]
  before_script:
    - *ready_reports
    - nvidia-smi
    - mkdir debug
    - cd debug/
    - cmake ../ -DCOVERAGE_REPORT=ON -DCUDA_ARCH=$CUDA_ARCH
  script:
    - make -j
    - ./apps/oskar_system_info
    - make coverage
  after_script:
    - mv debug/coverage.xml build/reports/code-coverage.xml
    - mv debug/coverage/ ./
  artifacts:
    paths:
      - build/
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: build/reports/code-coverage.xml

build-test-release:
  stage: build and test
  tags: [ska-dp-gpu-a100]
  before_script:
    - *ready_reports
    # We need CMake >= 3.21.0 for the --output-junit option on CTest.
    - cmake --version
    - mkdir release
    - cd release/
    - cmake ../ -DCUDA_ARCH=$CUDA_ARCH
  script:
    - make -j
    - ./apps/oskar_system_info
    - ctest --output-junit unit-tests.xml
  after_script:
    - mv release/unit-tests.xml build/reports/
  artifacts:
    paths:
      - build/
    reports:
      junit: build/reports/unit-tests.xml

linting:
  stage: build and test
  before_script:
    - *ready_reports
    - apt-get update
    - apt-get install -y libomp-18-dev # Try to get headers right for clang-tidy.
    - mkdir release
    - cd release/
    - cmake ../ -DCUDA_ARCH=$CUDA_ARCH -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
  script:
    - echo "Running lint check"
    - run-clang-tidy -quiet '^(?:(?!extern/|test/|.*.cu).)*$\r?\n?' > clang-tidy.out
    - cat clang-tidy.out | ../cmake/clang-tidy-to-junit/clang-tidy-to-junit.py ../ > linting.xml
  after_script:
    - mv release/linting.xml build/reports/
  artifacts:
    paths:
      - build/

build-docs:
  stage: doc
  before_script:
    - mkdir build-docs && cd build-docs/
    - cmake ../
  script:
    - make doc_html
  artifacts:
    paths:
      - build-docs/docs/_build/html/
    expire_in: 3600 seconds

docker-release:
  stage: publish
  image: docker:20.10.7
  services:
    - docker:20.10.7-dind
  variables:
    GIT_VERSION: $CI_COMMIT_SHORT_SHA
  before_script:
    - apk add make git
    - cd docker
    - echo $CAR_OCI_REGISTRY_PASSWORD | docker login --username $CAR_OCI_REGISTRY_USERNAME --password-stdin $CAR_OCI_REGISTRY_HOST
  script:
    - docker build -t artefact.skao.int/oskar-python3 -t artefact.skao.int/oskar-python3:$CI_COMMIT_TAG oskar-python3/
    - docker push artefact.skao.int/oskar-python3:$CI_COMMIT_TAG
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never  # Disable stage, as it needs updating to run again.

apptainer-release:
  stage: publish
  before_script:
    - mkdir build-image && cd build-image/
    - cmake ../
    - export MY_VER=`cmake -LA -N . | grep OSKAR_VERSION_LONG | awk '{split($0,a,"="); print a[2]}'`
    - cd ../apptainer/
  script:
    - apptainer build OSKAR-${MY_VER}-Python3.sif Apptainer.python3
    - mv OSKAR-${MY_VER}-Python3.sif ../
  artifacts:
    paths:
      - OSKAR-*.sif
    expire_in: 3600 seconds
# rules:
#   - if: '$CI_COMMIT_TAG'

mac-release:
  stage: publish
  tags: [saas-macos-large-m2pro]
  image: macos-14-xcode-15
  before_script:
    - export HOMEBREW_NO_AUTO_UPDATE=1
    - export HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1
    # Install build tools and runtime dependencies as native arm64 Homebrew
    # bottles (qt@5 and hdf5 pour in seconds instead of compiling from source).
    # The build image's macOS version sets the bottles' deployment target, so
    # it must match the macOS 14 minimum declared in CMakeLists.txt;
    # validate_macos_bundle.sh enforces that floor on the packaged DMG.
    - brew install wget cmake qt@5 hdf5
    # Install casacore tables from source (no Homebrew bottle available).
    - mkdir build-casacore && cd build-casacore/
    - wget -O casacore.tar.gz https://github.com/casacore/casacore/archive/v3.5.0.tar.gz
    - mkdir casacore-src
    - tar zxf casacore.tar.gz -C casacore-src --strip-components 1
    - cmake casacore-src/
      -DMODULE=tables
      -DBUILD_TESTING=OFF
      -DBUILD_DYSCO=OFF
      -DBUILD_PYTHON=OFF
      -DBUILD_PYTHON3=OFF
      -DUSE_FFTW3=OFF
      -DUSE_OPENMP=OFF
      -DUSE_HDF5=OFF
      -DUSE_READLINE=OFF
      -DUSE_THREADS=ON
      -DCMAKE_INSTALL_PREFIX="$HOME/local"
      -DCMAKE_OSX_ARCHITECTURES=arm64
      -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0
    - make -j4 && make install
    - cd ../ && rm -rf build-casacore/
    # Build OSKAR.
    - mkdir build-mac && cd build-mac/
    - cmake ../
      -DFIND_OPENCL=ON
      -DCMAKE_PREFIX_PATH="/opt/homebrew/opt/qt@5;$HOME/local"
      -DCMAKE_OSX_ARCHITECTURES=arm64
      -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0
    - make -j4
  script:
    - make package
    - ../cmake/validate_macos_bundle.sh ./*.dmg
  artifacts:
    when: always
    paths:
      - build-mac/*.dmg
    expire_in: 3600 seconds
  rules:
    - when: manual
      allow_failure: true

homebrew-test:
  stage: publish
  tags: [saas-macos-large-m2pro]
  image: macos-26-xcode-26
  variables:
    # Tap that hosts the oskar formula.
    HOMEBREW_TAP_NAME: "ska-telescope/ska-homebrew-tap"
    HOMEBREW_TAP_URL: "https://gitlab.com/ska-telescope/ska-homebrew-tap.git"
  before_script:
    - export HOMEBREW_NO_AUTO_UPDATE=1
    - export HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1
  script:
    # Tap and lint the formula (depends_on "casacore" resolves within the tap).
    - brew tap "$HOMEBREW_TAP_NAME" "$HOMEBREW_TAP_URL"
    - brew audit --strict "$HOMEBREW_TAP_NAME/oskar"
    # Install and run the formula's own test block.
    - brew install --verbose "$HOMEBREW_TAP_NAME/oskar"
    - brew test "$HOMEBREW_TAP_NAME/oskar"
    # Smoke-test the installed binary (oskar_system_info exits 0 with no args).
    - oskar_system_info
  rules:
    - when: manual
      allow_failure: true

pages:
  stage: publish
  image: alpine
  dependencies:
    - build-docs
    - build-test-debug
  script:
    - rm -rf public
    - mkdir -p public
    - mv coverage/ public/
    - mv build-docs/docs/_build/html/* public/
  artifacts:
    paths:
      - public
#    expire_in: never

# Create Gitlab CI badges from CI metrics
# https://developer.skao.int/en/latest/tools/continuousintegration.html#automated-collection-of-ci-health-metrics-as-part-of-the-ci-pipeline
include:
  - project: "ska-telescope/templates-repository"
    file: "gitlab-ci/includes/finaliser.gitlab-ci.yml"
